<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top-nav">
    <div class="logo">PHK</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="blog.html">Blog</a>

        <div class="carousel-track" id="photography-carousel">
          <a class="carousel-card image-only" href="projects/photography-collection-1.html"><img src="assets/portfolio/photography1.jpg" alt="Photography preview 1" /></a>
          <a class="carousel-card image-only" href="projects/photography-collection-2.html"><img src="assets/portfolio/photography2.jpg" alt="Photography preview 2" /></a>
          <a class="carousel-card image-only" href="projects/photography-collection-3.html"><img src="assets/portfolio/photography3.jpg" alt="Photography preview 3" /></a>
          <a class="carousel-card image-only" href="projects/photography-collection-1.html"><img src="assets/portfolio/photography4.jpg" alt="Photography preview 4" /></a>
          <a class="carousel-card image-only" href="projects/photography-collection-2.html"><img src="assets/portfolio/photography5.jpg" alt="Photography preview 5" /></a>
          <a class="carousel-card image-only" href="projects/photography-collection-3.html"><img src="assets/portfolio/photography6.jpg" alt="Photography preview 6" /></a>
        </div>

    <section class="portfolio-section">
      <div class="portfolio-section-head">
        <h2>Drawings</h2>
      </div>
      <div class="carousel-shell">
        <button class="carousel-btn" type="button" aria-label="Scroll drawings left" data-direction="left" data-target="drawing-carousel">&#10094;</button>
        <div class="carousel-track" id="drawing-carousel">
          <a class="carousel-card image-only" href="projects/drawing-study-1.html"><img src="assets/portfolio/drawing1.jpg" alt="Drawing preview 1" /></a>
          <a class="carousel-card image-only" href="projects/drawing-study-2.html"><img src="assets/portfolio/drawing2.jpg" alt="Drawing preview 2" /></a>
          <a class="carousel-card image-only" href="projects/drawing-study-3.html"><img src="assets/portfolio/drawing3.png" alt="Drawing preview 3" /></a>
          <a class="carousel-card image-only" href="projects/drawing-study-1.html"><img src="assets/portfolio/drawing4.jpg" alt="Drawing preview 4" /></a>
          <a class="carousel-card image-only" href="projects/drawing-study-2.html"><img src="assets/portfolio/drawing5.png" alt="Drawing preview 5" /></a>
          <a class="carousel-card image-only" href="projects/drawing-study-3.html"><img src="assets/portfolio/drawing6.jpg" alt="Drawing preview 6" /></a>
        </div>
        <button class="carousel-btn" type="button" aria-label="Scroll drawings right" data-direction="right" data-target="drawing-carousel">&#10095;</button>
      </div>
    </section>

    <section class="portfolio-section">
      <div class="portfolio-section-head">
        <h2>Graphic Design</h2>
      </div>
      <div class="carousel-shell">
        <button class="carousel-btn" type="button" aria-label="Scroll graphic design left" data-direction="left" data-target="design-carousel">&#10094;</button>
        <div class="carousel-track" id="design-carousel">
          <a class="carousel-card image-only" href="projects/uncle-nicks-zucchini-relish.html"><img src="assets/portfolio/graphicdesign1.png" alt="Graphic design preview 1" /></a>
          <a class="carousel-card image-only" href="projects/pringles-advertisement.html"><img src="assets/portfolio/graphicdesign2.png" alt="Graphic design preview 2" /></a>
          <a class="carousel-card image-only" href="projects/sanson-estate-brochure.html"><img src="assets/portfolio/graphicdesign3.png" alt="Graphic design preview 3" /></a>

          <a class="carousel-card image-only" href="projects/pringles-advertisement.html"><img src="assets/portfolio/graphicdesign5.png" alt="Graphic design preview 5" /></a>
          <a class="carousel-card image-only" href="projects/sanson-estate-brochure.html"><img src="assets/portfolio/graphicdesign6.jpg" alt="Graphic design preview 6" /></a>
        </div>
        <button class="carousel-btn" type="button" aria-label="Scroll graphic design right" data-direction="right" data-target="design-carousel">&#10095;</button>
      </div>
    </section>
  </main>

  <script>
    const carouselButtons = document.querySelectorAll('.carousel-btn');

    carouselButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const target = document.getElementById(button.dataset.target);
        const firstCard = target.querySelector('.carousel-card');
        const step = firstCard ? firstCard.clientWidth + 12 : 300;
        const direction = button.dataset.direction === 'left' ? -1 : 1;

        target.scrollBy({
          left: direction * step,
          behavior: 'smooth'
        });
      });
    });
  </script>
</body>
</html>
